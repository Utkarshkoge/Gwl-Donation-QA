client_id = "98709714b69d21519f74b8cbd0a5a7be"
name = "GWL-Donations-QA"
application_url = "https://gwl-donation-qa-production.up.railway.app/"
embedded = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = ["refunds/create"]
  uri = "/webhooks/refunds/create"

  [[webhooks.subscriptions]]
  topics = ["subscription_billing_attempts/failure"]
  uri = "/webhooks/subscription_billing_attempts/failure"

  [[webhooks.subscriptions]]
  topics = ["subscription_billing_attempts/success"]
  uri = "/webhooks/subscription_billing_attempts/success"

  [[webhooks.subscriptions]]
  topics = ["subscription_contracts/create"]
  uri = "/webhooks/subscription_contracts/create"

  [[webhooks.subscriptions]]
  topics = ["subscription_contracts/update"]
  uri = "/webhooks/subscription_contracts/update"

[access_scopes]
scopes = "read_customers,read_metaobjects,read_orders,read_publications,read_purchase_options,read_shopify_payments_payouts,write_customers,write_metaobject_definitions,write_metaobjects,write_orders,write_products,write_publications,write_purchase_options,read_own_subscription_contracts,write_own_subscription_contracts,read_draft_orders,write_draft_orders"

[auth]
redirect_urls = [
  "https://gwl-donation-qa-production.up.railway.app/auth/callback",
  "https://gwl-donation-qa-production.up.railway.app/api/auth"
]

[app_proxy]
url = "https://gwl-donation-qa-production.up.railway.app"
subpath = "pos-donation-1"
prefix = "apps"

[build]
automatically_update_urls_on_dev = true
